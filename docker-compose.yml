
services:
  # ── Training Service ──────────────────────────────────────────────────────
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    container_name: mlops-train
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    profiles:
      - train

  # ── API Service ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODELS_DIR=/app/models
    depends_on:
      - mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: mlops-mlflow
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlruns/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/app/mlartifacts
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root /app/mlartifacts
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/2.0/mlflow/experiments/list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s


networks:
  default:
    name: mlops-network

volumes:
  mlruns:
  mlartifacts:
