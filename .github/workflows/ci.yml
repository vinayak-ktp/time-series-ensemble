name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: mlops-timeseries-api

jobs:
  # ── Linting & Code Quality ─────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 src/ api/ tests/

      - name: Check black formatting
        run: black --check src/ api/ tests/ --line-length=100

      - name: Check import ordering
        run: isort --check-only src/ api/ tests/

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --cov=src --cov=api \
            --cov-report=xml --cov-report=term-missing \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── DVC Pipeline (data stages only — training is slow in CI) ──────────────
  dvc-pipeline:
    name: Run DVC Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline stages (ingest → preprocess → featurize)
        run: |
          python src/data/ingestion.py --config params.yaml
          python src/data/preprocessing.py --config params.yaml
          python src/features/engineering.py --config params.yaml

      - name: Validate DVC pipeline config
        run: |
          dvc dag

      - name: Show produced data artefacts
        run: |
          echo "Train:" && wc -l data/processed/train_features.csv
          echo "Val:"   && wc -l data/processed/val_features.csv
          echo "Test:"  && wc -l data/processed/test_features.csv

      - name: Upload data artefacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Show pre-committed metrics
        run: |
          cat metrics/metrics.json | python3 -m json.tool

  # ── Build Docker Image ─────────────────────────────────────────────────────
  docker-build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Test Docker image health
        run: |
          docker run -d \
            --name test-api \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:latest
          echo "Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is up after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health | python3 -m json.tool
          curl -sf http://localhost:8000/ | python3 -m json.tool
          docker stop test-api

      - name: Log in to Docker Hub
        if: >-
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: >-
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          vars.DOCKERHUB_USERNAME != ''
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

