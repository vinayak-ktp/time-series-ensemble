# Project Parameters - DVC Pipeline Configuration

base:
  test_size: 0.2
  val_size: 0.1
  target_col: OT
  datetime_col: date

data:
  raw_path: data/raw/ETTh1.csv
  processed_train_path: data/processed/train.csv
  processed_val_path: data/processed/val.csv
  processed_test_path: data/processed/test.csv
  horizon: 24       # forecast horizon (steps ahead)
  freq: H           # hourly

features:
  lag_periods: [1, 2, 3, 6, 12, 24, 48, 72, 168]   # 1h to 1 week + 3-day lag
  rolling_windows: [6, 12, 24, 168]
  ewm_spans: [12, 24]                                # EWM recency-weighted trend signal
  diff_pairs: [[1, 2], [1, 24], [24, 168]]           # velocity features
  use_interactions: false                            # disabled: causing overfitting
  use_time_features: true

ridge:
  alpha: 1.0

lightgbm:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

xgboost:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  min_child_weight: 5

catboost:
  n_estimators: 1000       # more trees for finer residual fitting
  learning_rate: 0.02      # slower learning = better generalization
  max_depth: 6             # back to 6 to avoid overfitting residuals
  subsample: 0.8
  reg_lambda: 2.0          # stronger regularization for residuals
  min_child_samples: 20    # prevent over-specialization

extra_trees:
  n_estimators: 300
  max_depth: 12            # bounded depth
  min_samples_leaf: 4      # safer default
  max_features: 0.5

hybrid:
  base_model: ridge
  residual_models: [catboost, extra_trees]

mlflow:
  experiment_name: mlops-timeseries-ensemble
  tracking_uri: mlruns

api:
  host: 0.0.0.0
  port: 8000
  model_name: ensemble_forecaster
  model_stage: Production
